<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Contacto - Belligood Estética en Móstoles</title>
    <meta name="description" content="Contacta con Belligood Estética. Pide tu cita por teléfono, email o a través de nuestro formulario. Nos encontramos en Calle Orquidea 2, Móstoles.">
    <meta name="keywords" content="contacto estética móstoles, pedir cita belligood, teléfono belligood, ubicación estética">
    
    <link rel="icon" href="/assets/images/favicon.webp" type="image/webp">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/assets/css/styles.css">
</head>

<body>

    <div id="navbar-placeholder"></div>

    <main>
        <section class="gallery-page-header">
            <div class="container">
                <h1 class="section-title" style="margin-bottom: 1rem;">Contacta con Nosotros</h1>
                <p class="section-subtitle">¿Tienes alguna duda o quieres reservar tu cita? Estamos aquí para ayudarte.</p>
            </div>
        </section>

        <section class="contact-section">
            <div class="container">
                <div class="contact-grid">
                    <div class="contact-info-container">
                        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem;">Información de Contacto</h2>
                        <div class="contact-info-details">
                            <p class="contact-info-item"><i class="fas fa-map-marker-alt"></i>Calle Orquidea 2, Móstoles</p>
                            <p class="contact-info-item"><i class="fas fa-phone-alt"></i>659 30 63 94 / 916 64 62 51</p>
                            <p class="contact-info-item"><i class="fas fa-envelope"></i>belligoodmgmt2@gmail.com</p>
                        </div>
                        
                        <h3 style="font-size: 1.25rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem;">Síguenos en Redes</h3>
                        <div class="footer-socials" style="justify-content: flex-start;">
                            <a href="https://www.instagram.com/belligood_estetica/" target="_blank"><i class="fab fa-instagram fa-2x"></i></a>
                            <a href="https://www.tiktok.com/@belli.good" target="_blank"><i class="fab fa-tiktok fa-2x"></i></a>
                        </div>
                        
                        <div class="contact-map">
                            <iframe src="https://maps.google.com/maps?q=Calle%20Orquidea%202,%20M%C3%B3stoles&t=&z=15&ie=UTF8&iwloc=&output=embed" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                        </div>
                    </div>

                    <div class="contact-form-container">
                        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem;">Envíanos tu Consulta</h2>
                        <form id="contact-form">
                            <div class="form-group-grid">
                                <div class="form-group">
                                    <label for="nombre" class="form-label">Nombre</label>
                                    <input type="text" id="nombre" name="nombre" required class="form-input">
                                </div>
                                <div class="form-group">
                                    <label for="apellido" class="form-label">Apellido</label>
                                    <input type="text" id="apellido" name="apellido" required class="form-input">
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="telefono" class="form-label">Número de Teléfono</label>
                                <input type="tel" id="telefono" name="telefono" required class="form-input">
                            </div>
                            <div class="form-group">
                                <label for="email" class="form-label">Correo Electrónico</label>
                                <input type="email" id="email" name="email" required class="form-input">
                            </div>
                            <div class="form-group">
                                <label for="consulta" class="form-label">Consulta</label>
                                <textarea id="consulta" name="consulta" rows="4" required class="form-textarea"></textarea>
                            </div>
                            <div>
                                <button type="submit" class="btn btn-primary" style="background-color: var(--color-green-500); border-color: var(--color-green-500); width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                                    <i class="fab fa-whatsapp"></i>
                                    <span>Enviar por WhatsApp</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <a href="https://wa.me/34659306394" target="_blank" class="whatsapp-float">
        <i class="fab fa-whatsapp fa-2x"></i>
    </a>

    <script src="/assets/js/main.js"></script>
</body>
</html>
