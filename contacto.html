<body class="bg-white font-sans text-gray-800">

    <div id="navbar-placeholder"></div>

    <main>
        <section class="bg-gray-50 py-16">
            <div class="container mx-auto px-6 text-center">
                <h1 class="text-4xl md:text-5xl font-bold tracking-tight">Contacta con Nosotros</h1>
                <p class="text-lg mt-4 text-secondary max-w-2xl mx-auto">¿Tienes alguna duda o quieres reservar tu cita? Estamos aquí para ayudarte.</p>
            </div>
        </section>

        <section class="py-20">

                <div class="space-y-8">
                    <div>
                        <h2 class="text-2xl font-bold mb-4">Información de Contacto</h2>
                        <div class="space-y-3 text-lg text-secondary">

                        </div>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold mb-4">Síguenos en Redes</h3>
                        <div class="flex space-x-4">
                            <a href="https://www.instagram.com/belligood_estetica/" target="_blank" class="text-secondary hover:text-primary transition-colors"><i class="fab fa-instagram fa-2x"></i></a>
                            <a href="https://www.tiktok.com/@belli.good" target="_blank" class="text-secondary hover:text-primary transition-colors"><i class="fab fa-tiktok fa-2x"></i></a>
                        </div>
                    </div>
                    <div class="w-full h-64 rounded-lg overflow-hidden shadow-lg">

                </div>

                <div class="bg-gray-50 p-8 rounded-lg shadow-sm">
                    <h2 class="text-2xl font-bold mb-6">Envíanos tu Consulta</h2>
                    <form id="contact-form" class="space-y-6">
                        <div class="grid sm:grid-cols-2 gap-6">
                            <div>
                                <label for="nombre" class="block text-sm font-medium text-gray-700">Nombre</label>
                                <input type="text" id="nombre" name="nombre" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary">
                            </div>
                            <div>
                                <label for="apellido" class="block text-sm font-medium text-gray-700">Apellido</label>
                                <input type="text" id="apellido" name="apellido" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary">
                            </div>
                        </div>
                        <div>
                            <label for="telefono" class="block text-sm font-medium text-gray-700">Número de Teléfono</label>
                            <input type="tel" id="telefono" name="telefono" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700">Correo Electrónico</label>
                            <input type="email" id="email" name="email" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary">
                        </div>
                        <div>
                            <label for="consulta" class="block text-sm font-medium text-gray-700">Consulta</label>
                            <textarea id="consulta" name="consulta" rows="4" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-primary focus:border-primary"></textarea>
                        </div>
                        <div>
                            <button type="submit" class="w-full bg-green-500 text-white font-bold py-3 px-6 rounded-md hover:bg-green-600 transition-all flex items-center justify-center space-x-2">
